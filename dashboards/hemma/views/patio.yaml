type: custom:grid-layout
title: patio
path: patio
layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
cards:
  # ROOM HERO CARD
  - type: custom:button-card
    template: hemma_room
    name: Patio
    variables:
      image: home
      image_night: patio-night
      image_position: center center

      # Weather for outdoor area
      show_weather: true
      weather_mode: outdoor
      weather_entity: weather.forecast_home
      # TODO: {Parth Shah} Add outdoor temperature sensor if available
      # weather_temp_sensor: sensor.outdoor_temperature
      temp_unit: "F"

  # MOBILE NAVBAR
  - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

  # ENTITY CARDS
  - type: custom:layout-card
    class: hemma-entities
    layout_type: custom:grid-layout
    layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
    cards:
      # Patio Lights (Matter switch)
      - type: custom:button-card
        template: hemma_light
        entity: switch.patio_lights
        name: Patio Lights
        variables:
          icon: light

      # TODO: {Parth Shah} Add outdoor sensors/devices if available
      # - type: custom:button-card
      #   template: hemma_entity
      #   entity: sensor.outdoor_temperature
      #   name: Temperature
      #   variables:
      #     icon: thermometer
