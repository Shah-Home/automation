type: custom:grid-layout
title: master-bed-room
path: master-bed-room
layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
cards:
  # ROOM HERO CARD
  - type: custom:button-card
    template: hemma_room
    name: Master Bedroom
    variables:
      image: bedroom
      image_position: center center

      # Master Bedroom has full environmental monitoring
      show_temp: true
      temp_sensor: sensor.master_bedroom_temperature_sensor

      show_humidity: true
      humidity_sensor: sensor.master_bedroom_humidity_sensor

      show_quality: true
      quality_sensor: sensor.master_bedroom_air_quality_sensor

      show_weather: true
      weather_mode: room
      temp_unit: "F"

      # TODO: {Parth Shah} No motion sensor in master bedroom
      # show_motion: true
      # motion_sensor: binary_sensor.master_bedroom_motion

  # MOBILE NAVBAR
  - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

  # ENTITY CARDS
  - type: custom:layout-card
    class: hemma-entities
    layout_type: custom:grid-layout
    layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
    cards:
      # TODO: {Parth Shah} No climate control in master bedroom
      # - type: custom:button-card
      #   template: hemma_thermostat
      #   entity: climate.master_bedroom
      #   name: Thermostat
      #   variables:
      #     temp_sensor: sensor.master_bedroom_temperature_sensor

      # Master Bedroom Lights (Matter switch)
      - type: custom:button-card
        template: hemma_light
        entity: switch.master_bedroom_lights
        name: Bedroom Lights
        variables:
          icon: light

      # Master Bedroom Speaker (Google Cast)
      - type: custom:button-card
        template: hemma_media
        entity: media_player.master_bedroom_speaker
        name: Bedroom Speaker
        variables:
          icon: speaker

      # VeSync Air Purifier
      - type: custom:button-card
        template: hemma_fan
        entity: fan.air_purifier
        name: Air Purifier
        variables:
          icon: fan

      # Air Quality Sensors
      - type: custom:button-card
        template: hemma_entity
        entity: sensor.master_bedroom_carbon_dioxide_sensor
        name: CO₂
        variables:
          icon: molecule

      - type: custom:button-card
        template: hemma_entity
        entity: sensor.master_bedroom_pm2_5_sensor
        name: PM2.5
        variables:
          icon: blur

      # TODO: {Parth Shah} Add TV if you have one
      # - type: custom:button-card
      #   template: hemma_entity
      #   entity: media_player.master_bedroom_tv
      #   name: TV
      #   variables:
      #     icon: tv
