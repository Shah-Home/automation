type: custom:grid-layout
title: dining-room
path: dining-room
layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
cards:
  # ROOM HERO CARD
  - type: custom:button-card
    template: hemma_room
    name: Dining Room
    variables:
      image: home
      image_night: diningroom-night
      image_position: center center

      # TODO: {Parth Shah} No dedicated dining room temp sensor
      # show_temp: true
      # temp_sensor: sensor.dining_room_temperature

      show_weather: true
      weather_mode: room
      temp_unit: "F"

      # Presence from FP2
      show_motion: true
      motion_sensor: binary_sensor.dining_room_presence

  # MOBILE NAVBAR
  - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

  # ENTITY CARDS
  - type: custom:layout-card
    class: hemma-entities
    layout_type: custom:grid-layout
    layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
    cards:
      # Dining Room Lights (Matter switch)
      - type: custom:button-card
        template: hemma_light
        entity: switch.dining_room_lights
        name: Dining Lights
        variables:
          icon: light

      # FP2 Main Presence
      - type: custom:button-card
        template: hemma_entity
        entity: binary_sensor.dining_room_presence
        name: Dining Room
        variables:
          icon: motion

      # Illuminance Sensor (FP2)
      - type: custom:button-card
        template: hemma_entity
        entity: sensor.dining_room_light
        name: Light Level
        variables:
          icon: brightness
