type: custom:grid-layout
title: garage
path: garage
layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
cards:
  # ROOM HERO CARD
  - type: custom:button-card
    template: hemma_room
    name: Garage
    variables:
      image: home
      image_night: garage-night
      image_position: center center

      show_weather: true
      weather_mode: room
      temp_unit: "F"

      # TODO: {Parth Shah} Add garage door sensor if available
      # show_motion: true
      # motion_sensor: binary_sensor.garage_door

  # MOBILE NAVBAR
  - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

  # ENTITY CARDS
  - type: custom:layout-card
    class: hemma-entities
    layout_type: custom:grid-layout
    layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
    cards:
      # Garage Camera (Nest)
      - type: custom:button-card
        template: hemma_entity
        entity: camera.garage_camera
        name: Garage Camera
        variables:
          icon: camera

      # TODO: {Parth Shah} Add garage door opener if available
      # - type: custom:button-card
      #   template: hemma_entity
      #   entity: cover.garage_door
      #   name: Garage Door
      #   variables:
      #     icon: garage
