type: custom:grid-layout
title: kitchen
path: kitchen
layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
cards:
  # ROOM HERO CARD
  - type: custom:button-card
    template: hemma_room
    name: Kitchen
    variables:
      image: kitchen
      image_night: home-night
      image_position: center center

      # TODO: {Parth Shah} No dedicated kitchen temp sensor
      # Using FP2 presence sensor areas instead
      # show_temp: true
      # temp_sensor: sensor.kitchen_temperature

      # show_humidity: true
      # humidity_sensor: sensor.kitchen_humidity

      # TODO: {Parth Shah} No kitchen air quality sensor
      # show_quality: true
      # quality_sensor: sensor.kitchen_air_quality

      show_weather: true
      weather_mode: room
      temp_unit: "F"

      # Presence from FP2 zones
      show_motion: true
      motion_sensor: binary_sensor.cooking_area_presence

  # DESKTOP NAVBAR
  - !include /config/dashboards/templates/includes/hemma_navigation.yaml

  # MOBILE NAVBAR
  - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

  # ENTITY CARDS
  - type: custom:layout-card
    class: hemma-entities
    layout_type: custom:grid-layout
    layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
    cards:
      # Kitchen Island Lights (Matter switch)
      - type: custom:button-card
        template: hemma_light
        entity: switch.kitchen_island_lights
        name: Island Lights
        variables:
          icon: light

      # Kitchen Speaker (Google Cast)
      - type: custom:button-card
        template: hemma_media
        entity: media_player.kitchen_speaker
        name: Kitchen Speaker
        variables:
          icon: speaker

      - type: custom:button-card
        template: hemma_vacuum
        entity: vacuum.cleaning_lady
        name: Clean Kitchen
        variables:
          room: kitchen

      # # FP2 Presence Zones
      # - type: custom:button-card
      #   template: hemma_entity
      #   entity: binary_sensor.cooking_area_presence
      #   name: Cooking Area
      #   variables:
      #     icon: motion

      # - type: custom:button-card
      #   template: hemma_entity
      #   entity: binary_sensor.island_sitting_area_presence
      #   name: Island Area
      #   variables:
      #     icon: motion

