# /config/dashboards/hemma/hemma.yaml
# Hemma Dashboard - Customized for Parth Shah's Home
# ============================================================================
# Generated: February 2026
# Entity Registry: Matched to your actual Home Assistant setup
#
# This configuration uses your real entity IDs from:
# - Matter switches (4 lights)
# - Nest thermostat & cameras
# - Aqara FP2 presence sensors
# - Google Cast media players
# - VeSync air purifier
# - iRobot Roomba vacuum
# - Temperature/Humidity sensors
# ============================================================================

button_card_templates: !include /config/dashboards/templates/all_button_card_templates.yaml

# Kiosk Mode (optional - requires kiosk-mode HACS integration)
kiosk_mode:
  hide_header: true
  hide_sidebar: true
  hide_dialog_light_settings_actions: true
  hide_dialog_logbook: true
  mobile_settings:
    hide_header: true
    hide_sidebar: true

views:
  - !include /config/dashboards/metadata/views/home/view.yaml
  - !include /config/dashboards/metadata/views/first_floor/view.yaml
  - !include /config/dashboards/metadata/views/second_floor/view.yaml
  - !include /config/dashboards/metadata/views/third_floor/view.yaml
  - !include /config/dashboards/metadata/views/outdoors/view.yaml
  - !include /config/dashboards/metadata/views/living_room/view.yaml
  - !include /config/dashboards/metadata/views/kitchen/view.yaml
  - !include /config/dashboards/metadata/views/dining_room/view.yaml
  - !include /config/dashboards/metadata/views/master_bed_room/view.yaml
  - !include /config/dashboards/metadata/views/patio/view.yaml
  - !include /config/dashboards/metadata/views/garage/view.yaml
  - !include /config/dashboards/metadata/views/bathroom/view.yaml
  - !include /config/dashboards/metadata/views/entrance/view.yaml
  - !include /config/dashboards/metadata/views/rec_room/view.yaml
  - !include /config/dashboards/metadata/views/guest_bathroom/view.yaml
