# /config/dashboards/hemma/hemma.yaml
# Hemma Dashboard - Customized for Parth Shah's Home
# ============================================================================
# Generated: February 2026
# Entity Registry: Matched to your actual Home Assistant setup
#
# This configuration uses your real entity IDs from:
# - Matter switches (4 lights)
# - Nest thermostat & cameras
# - Aqara FP2 presence sensors
# - Google Cast media players
# - VeSync air purifier
# - iRobot Roomba vacuum
# - Temperature/Humidity sensors
# ============================================================================

button_card_templates: !include_dir_merge_named /config/dashboards/templates/button_cards

# Kiosk Mode (optional - requires kiosk-mode HACS integration)
kiosk_mode:
  hide_header: true
  hide_sidebar: true
  hide_dialog_light_settings_actions: true
  hide_dialog_logbook: true
  mobile_settings:
    hide_header: true
    hide_sidebar: true

views:
  - !include /config/dashboards/hemma/views/home.yaml
  - !include /config/dashboards/hemma/views/first_floor.yaml
  - !include /config/dashboards/hemma/views/second_floor.yaml
  - !include /config/dashboards/hemma/views/third_floor.yaml
  - !include /config/dashboards/hemma/views/outdoors.yaml
  - !include /config/dashboards/hemma/views/living_room.yaml
  - !include /config/dashboards/hemma/views/kitchen.yaml
  - !include /config/dashboards/hemma/views/dining_room.yaml
  - !include /config/dashboards/hemma/views/master_bed_room.yaml
  - !include /config/dashboards/hemma/views/patio.yaml
  - !include /config/dashboards/hemma/views/garage.yaml
  - !include /config/dashboards/hemma/views/bathroom.yaml
  - !include /config/dashboards/hemma/views/entrance.yaml
  - !include /config/dashboards/hemma/views/rec_room.yaml
  - !include /config/dashboards/hemma/views/guest_bathroom.yaml
  - !include /config/dashboards/hemma/views/master_bathroom.yaml
