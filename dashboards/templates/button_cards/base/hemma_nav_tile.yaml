hemma_nav_tile:
  template:
    - hemma_default
    - hemma_card_shell
  show_state: false
  show_icon: true
  tap_action:
    action: navigate
    navigation_path: "[[[ return variables.path ]]]"
  hold_action:
    action: none
  double_tap_action:
    action: none
  variables:
    # Default destination used when a specific room path is not provided.
    path: /dashboard-hemma/home
    # Optional secondary copy shown under the room name.
    subtitle: ""
    card_display: grid
  styles:
    card:
      - cursor: pointer
    grid:
      - row-gap: 6px
    img_cell:
      - display: flex
      - align-items: center
      - justify-content: flex-start
    card:hover:
      - background: var(--ha-card-background-active)
      - transform: translateY(-1px)
    icon:
      - color: var(--primary-text-color)
      - opacity: 0.92
    state:
      - display: none
    name:
      - color: var(--primary-text-color)
      - font-size: var(--hemma-entity-name-font-current, var(--hemma-entity-name-font-desktop, 16px))
      - font-weight: 700
      - line-height: 1.15
      - text-align: left
      - white-space: normal
    custom_fields:
      subtitle:
        - grid-area: s
        - color: var(--secondary-text-color)
        - font-size: var(--hemma-entity-state-font-current, var(--hemma-entity-state-font-desktop, 14px))
        - line-height: 1.2
        - opacity: 0.8
        - justify-self: start
        - text-align: left
  custom_fields:
    subtitle: |
      [[[
        return variables.subtitle || '';
      ]]]
