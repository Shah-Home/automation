hemma_vacuum:
  template:
    - hemma_entity
  
  variables:
    icon: vacuum
    room: ""
    battery_entity: "sensor.cleaning_lady_battery"
    command_state_entity: "input_select.vacuum_command_state"
    vacuum_entity: "vacuum.cleaning_lady"
    battery_low_threshold: 20
  
  show_name: true
  show_label: false
  show_state: false
  show_entity_picture: true
  show_icon: false
  
  triggers_update:
    - '[[[ return variables.battery_entity || "" ]]]'
    - '[[[ return variables.command_state_entity || "" ]]]'
    - '[[[ return variables.vacuum_entity || "" ]]]'
  
  state_display: >
    [[[
      const commandState = states[variables.command_state_entity];
      const vacuumState = states[variables.vacuum_entity];
      
      // Prefer command state if available and not idle
      if (commandState && commandState.state !== "idle") {
        const state = commandState.state;
        const stateMap = {
          "command_sent": "Sending...",
          "command_acknowledged": "Starting...",
          "vacuum_cleaning": "Cleaning",
          "completed": "Done",
          "error_failed": "Error",
          "error_offline": "Offline",
          "error_timeout": "Timeout"
        };
        return stateMap[state] || state.replace(/_/g, " ");
      }
      
      // Fall back to vacuum state
      if (vacuumState) {
        const state = vacuumState.state;
        const stateMap = {
          "cleaning": "Cleaning",
          "idle": "Ready",
          "paused": "Paused",
          "error": "Error",
          "docked": "Docked"
        };
        return stateMap[state] || state;
      }
      
      return "Unknown";
    ]]]
  
  tap_action:
    action: call-service
    service: script.clean_room
    service_data:
      room: "[[[ return variables.room ]]]"
  
  hold_action:
    action: more-info
    entity: '[[[ return variables.vacuum_entity ]]]'
  
  # State-based styling: Command state takes precedence
  state:
    # Command state: command_sent (Pulsing Yellow)
    - operator: template
      value: >
        [[[
          return states[variables.command_state_entity]?.state === "command_sent";
        ]]]
      styles:
        img_cell:
          - animation: pulsing 1s ease-in-out infinite
        entity_picture:
          - filter: brightness(1.3) saturate(1.4) hue-rotate(45deg)
          - color: '#FFC107'
    
    # Command state: command_acknowledged (Rotating Cyan - slower)
    - operator: template
      value: >
        [[[
          return states[variables.command_state_entity]?.state === "command_acknowledged";
        ]]]
      styles:
        img_cell:
          - animation: rotating-slow 2.4s linear infinite
        entity_picture:
          - filter: brightness(1.2) saturate(1.3) hue-rotate(-45deg)
          - color: '#00BCD4'
    
    # Command state: vacuum_cleaning (Rotating Green - fast)
    - operator: template
      value: >
        [[[
          return states[variables.command_state_entity]?.state === "vacuum_cleaning";
        ]]]
      styles:
        img_cell:
          - animation: rotating 1.6s linear infinite
        entity_picture:
          - filter: brightness(1.3) saturate(1.4)
          - color: '#4CAF50'
    
    # Command state: completed (Dim Green - no animation)
    - operator: template
      value: >
        [[[
          return states[variables.command_state_entity]?.state === "completed";
        ]]]
      styles:
        img_cell:
          - animation: none
        entity_picture:
          - filter: brightness(0.95) saturate(0.8)
          - color: '#66BB6A'
    
    # Command state: error_* (Pulsing Red - fast)
    - operator: template
      value: >
        [[[
          const state = states[variables.command_state_entity]?.state || "";
          return state.startsWith("error_");
        ]]]
      styles:
        img_cell:
          - animation: pulsing-fast 0.6s ease-in-out infinite
        entity_picture:
          - filter: brightness(1.2) saturate(1.5) hue-rotate(0deg)
          - color: '#F44336'
    
    # Vacuum state: cleaning (if no command state)
    - operator: template
      value: >
        [[[
          const cmdState = states[variables.command_state_entity]?.state;
          const vacState = states[variables.vacuum_entity]?.state;
          return (!cmdState || cmdState === "idle") && vacState === "cleaning";
        ]]]
      styles:
        img_cell:
          - animation: rotating 1.6s linear infinite
        entity_picture:
          - filter: brightness(1.3) saturate(1.4)
          - color: '#4CAF50'
    
    # Vacuum state: paused
    - operator: template
      value: >
        [[[
          const cmdState = states[variables.command_state_entity]?.state;
          const vacState = states[variables.vacuum_entity]?.state;
          return (!cmdState || cmdState === "idle") && vacState === "paused";
        ]]]
      styles:
        img_cell:
          - animation: pulsing 1s ease-in-out infinite
        entity_picture:
          - filter: brightness(1.1) saturate(1.2) hue-rotate(45deg)
          - color: '#FFC107'
  
  styles:
    card:
      - padding: 12px
    img_cell:
      - width: 32px
      - height: 32px
      - transition: animation 0.3s ease, filter 0.3s ease
    name:
      - font-weight: 500
      - font-size: 15px
    state:
      - font-size: 12px
      - opacity: 0.7
      - font-weight: 400
    entity_picture:
      - transition: filter 0.3s ease, color 0.3s ease
  
  custom_fields:
    battery: |
      [[[
        const batt = variables.battery_entity;
        if (!batt) return "";
        const st = states[batt];
        if (!st) return "";
        const raw = (st.state ?? "").toString().toLowerCase();
        const isLowWord = ["low", "critical"].includes(raw);
        const n = parseFloat(raw);
        const hasNum = Number.isFinite(n);
        const threshold = Number(variables.battery_low_threshold ?? 20);
        const isLowNum = hasNum && n <= threshold;
        if (!(isLowWord || isLowNum)) return "";
        const size = (window.innerWidth <= 768) ? 20 : 24;
        return `
          <ha-icon
            icon="mdi:battery-alert"
            style="
              --mdc-icon-size:${size}px;
              color: var(--hemma-entity-inactive, var(--secondary-text-color));
              opacity: .7;
            "
          ></ha-icon>
        `;
      ]]]
  
  extra_styles: |
    /* Rotating animation: 360° in 1.6s (standard speed) */
    @keyframes rotating {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Rotating animation: 360° in 2.4s (slower for acknowledged) */
    @keyframes rotating-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Pulsing animation: opacity fade 1s (standard) */
    @keyframes pulsing {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    /* Pulsing animation: opacity fade 0.6s (fast for errors) */
    @keyframes pulsing-fast {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    /* Battery indicator visibility on hover/focus */
    #battery {
      opacity: 0;
      transform: scale(.92);
      transition: opacity .8s ease, transform .3s ease;
      will-change: opacity, transform;
    }
    
    @media (hover: hover) and (pointer: fine) {
      :host(:hover) #battery,
      :host(:focus-within) #battery {
        opacity: .6;
        transform: scale(1);
      }
    }
    
    @media (hover: none) and (pointer: coarse) {
      #battery { opacity: 0; }
    }
    
    /* Smooth state transitions */
    #img-cell {
      position: relative;
    }
    
    /* Responsive sizing */
    @media (max-width: 600px) {
      #img-cell {
        width: 28px !important;
        height: 28px !important;
      }
    }
