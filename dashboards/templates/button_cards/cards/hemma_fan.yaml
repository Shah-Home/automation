hemma_fan:
  template:
    - hemma_entity
    - hemma_picture_interaction

  show_entity_picture: true
  show_icon: true
  show_name: true
  show_state: true
  name: Fan

  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: toggle

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'
