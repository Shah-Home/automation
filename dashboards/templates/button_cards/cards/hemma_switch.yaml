hemma_switch:
  template:
    - hemma_picture_interaction

  show_icon: true
  show_state: false

  # Match Hemma interaction model
  tap_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  hold_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  icon_tap_action:
    action: toggle

  icon_hold_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  icon: >
    [[[
      return variables.icon || entity.attributes.icon || "mdi:toggle-switch";
    ]]]

  name: >
    [[[
      return entity.attributes.friendly_name;
    ]]]

  state:
    - value: "on"
      styles:
        card:
          - background-color: var(--primary-color)
    - value: "off"
      styles:
        card:
          - background-color: var(--card-background-color)
