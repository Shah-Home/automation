hemma_switch:
  template:
    - hemma_picture_interaction

  show_icon: true
  show_state: false

  # Match Hemma interaction model
  tap_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  hold_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  icon_tap_action:
    action: toggle

  icon_hold_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  icon: >
    [[[
      return variables.icon || entity.attributes.icon || "mdi:toggle-switch";
    ]]]

  name: >
    [[[
      return entity.attributes.friendly_name;
    ]]]

  state:
    - value: "on"
      styles:
        card:
          - background-color: var(--primary-color)
    - value: "off"
      styles:
        card:
          - background-color: var(--card-background-color)

hemma_thermostat:
  template: [hemma_entity]
  show_entity_picture: false
  show_icon: false
  show_label: false
  name: Thermostat

  variables:
    thermostat_toggle_helper: input_boolean.hemma_thermostat_overlay
    temp_sensor:

  state_display: |
    [[[
      const mode = entity.state;
      const target = entity.attributes.temperature;
      const target_temp_high = entity.attributes.target_temp_high;
      const target_temp_low = entity.attributes.target_temp_low;
      if (mode === 'cool') {
        return "Cooling to " + target + "°";
      } else if (mode === 'heat') {
        return "Heating to " + target + "°";
      } else if (mode === 'heat_cool'){
        return "Between " + target_temp_low + "° - " + target_temp_high + "°";
      } else {
        return "Off";
      }
    ]]]

  tap_action:
    action: call-service
    service: input_boolean.toggle
    service_data:
      entity_id: |
        [[[
          return variables.thermostat_toggle_helper;
        ]]]

  hold_action:
    action: more-info
    entity: "[[[ return entity.entity_id ]]]"

  custom_fields:
    temp_puck:
      card:
        type: custom:button-card
        entity: "[[[ return entity.entity_id ]]]"
        show_name: false
        show_icon: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          temp_display: |
            [[[
              let raw;
              const eid = variables.temp_sensor;
              if (eid && states[eid] && !["unknown","unavailable"].includes(states[eid].state)) {
                raw = states[eid].state;
              } else {
                raw = entity?.attributes?.current_temperature;
              }
              const n = Math.round(Number(raw));
              if (raw == null || Number.isNaN(n)) return '';
              return `${n}`;
            ]]]
        styles:
          card:
            - background: |
                [[[
                  const s = String(entity?.state || '').toLowerCase();
                  const active = ["cool","heat","heat_cool"].includes(s);
                  return active
                    ? 'rgba(255,255,255,0.06)'
                    : 'rgba(255,255,255,0.02)';
                ]]]
            - border: 1.8px solid
            - border-color: |
                [[[
                  const s = String(entity?.state || '').toLowerCase();
                  const isActive = ["cool","heat","heat_cool"].includes(s);
                  const c = isActive
                    ? 'var(--hemma-entity-active, var(--primary-text-color))'
                    : 'var(--hemma-entity-inactive, var(--secondary-text-color))';
                  return `color-mix(in srgb, ${c} 55%, transparent)`;
                ]]]
            - border-radius: 50%
            - width: 100%
            - height: 100%
            - min-width: 0
            - min-height: 0
            - padding: 6px
            - margin: 0
            - box-shadow: none
            - opacity: 0.8
            - transition: opacity 0.2s ease, transform 0.15s ease, filter 0.2s ease
            - cursor: pointer
            - box-sizing: border-box
            - display: flex
            - align-items: center
            - justify-content: center
          name:
            - display: none
          custom_fields:
            temp_display:
              - display: flex
              - align-items: center
              - justify-content: center
              - width: 100%
              - height: 100%
              - color: |
                  [[[
                    const s = String(entity?.state || '').toLowerCase();
                    const isActive = ["cool","heat","heat_cool"].includes(s);
                    const c = isActive
                      ? 'var(--hemma-entity-active, var(--primary-text-color))'
                      : 'var(--hemma-entity-inactive, var(--secondary-text-color))';
                    return `color-mix(in srgb, ${c} 75%, transparent)`;
                  ]]]
              - font-weight: 500
              - line-height: 1
              - font-size: |
                  [[[
                    const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                    return isMobile ? '12px' : '16px';
                  ]]]
              - letter-spacing: -0.5px
        extra_styles: |
          @media (hover: hover) {
            :host ha-card:hover {
              opacity: 1 !important;
              filter: brightness(1.2);
              transform: scale(1.05);
            }
          }
          @media (hover: none) {
            :host ha-card:active {
              opacity: 1 !important;
              filter: brightness(1.2);
              transform: scale(1.05);
            }
          }

    cooling_modes:
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          position: absolute
          inset: 0 0 0 auto
          width: var(--rail-w)
          grid-template-columns: 1fr
          grid-template-rows: repeat(2, 1fr)
          height: 100%
          margin: 0
          padding: 0
          align-items: stretch
          justify-items: stretch
        cards:
          - type: custom:button-card
            template: [hemma_default]
            show_entity_picture: true
            entity_picture: |
              [[[
                return entity.state === 'off'
                  ? '/local/hemma/icons/power_on.svg'
                  : '/local/hemma/icons/power_off.svg';
              ]]]

            tap_action:
              action: call-service
              service: climate.set_hvac_mode
              data:
                entity_id: "[[[ return entity.entity_id ]]]"
                hvac_mode: |
                  [[[
                    const cur = entity.state;

                    // Turn OFF if running
                    if (cur !== 'off') return 'off';

                    return 'cool';
                  ]]]
            styles:
              card:
                - height: 100%
                - min-height: 0
                - padding: 0
                - box-shadow: none !important
                - background: |
                    [[[
                      return entity.state === 'off'
                        ? 'var(--hemma-control-on)'
                        : 'var(--hemma-control-off)';
                    ]]]
              img_cell: [{ width: "30%" }]
              icon: [{ width: "100%" }, { height: "100%" }]

          - type: custom:button-card
            template: [hemma_default]
            show_entity_picture: true
            entity_picture: |
              [[[
                const icons = {
                  heat: '/local/hemma/icons/heating.svg',
                  cool: '/local/hemma/icons/cooling.svg',
                  heat_cool: '/local/hemma/icons/heat_cool.svg',
                  off: '/local/hemma/icons/power_off.svg'
                };

                return icons[entity.state] || icons.cool;
              ]]]

            tap_action:
              action: call-service
              service: climate.set_hvac_mode
              data:
                entity_id: "[[[ return entity.entity_id ]]]"
                hvac_mode: |
                  [[[
                    const order = ['heat','cool','heat_cool'];
                    const cur = entity.state;
                    
                    if (!cur || cur === 'off')
                      return order[0];
                    
                    if (!order.includes(cur))
                      return 'cool';

                    const idx = order.indexOf(cur);
                    return order[(idx + 1) % order.length];
                  ]]]

            hold_action:
              action: call-service
              service: climate.set_preset_mode
              data:
                entity_id: "[[[ return entity.entity_id ]]]"
                preset_mode: |
                  [[[
                    return entity.attributes.preset_mode === 'eco'
                      ? 'none'
                      : 'eco';
                  ]]]

            styles:
              card:
                - height: 100%
                - min-height: 0
                - padding: 0
                - box-shadow: none !important
                - background: |
                    [[[
                      return ['cool','heat','heat_cool'].includes(entity.state)
                        ? 'var(--hemma-control-on)'
                        : 'var(--hemma-control-off)';
                    ]]]
              img_cell: [{ width: "35%" }]
              icon: [{ width: "100%" }, { height: "100%" }]

    target_temperature:
      card:
        type: custom:button-card
        template: [hemma_entity]
        entity: "[[[ return entity.entity_id ]]]"
        show_entity_picture: false
        show_icon: false
        name: Target Temp
        state_display: |
          [[[
            const raw = states['input_number.hemma_thermostat_target_temperature']?.state;
            const n = Math.round(Number(raw));
            if (raw == null || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(n)) return '';
            return `${n}°`;
          ]]]
        tap_action:
          action: call-service
          service: input_boolean.toggle
          service_data:
            entity_id: |
              [[[
                return variables.thermostat_toggle_helper;
              ]]]

        styles:
          card:
            - background: transparent !important
            - background-color: transparent !important
            - backdrop-filter: none !important
            - animation: none !important
            - box-shadow: none !important
            - border: none !important
            - padding-right: var(--rail-w)
          icon:
            - background: transparent !important
          img_cell:
            - background: transparent !important
          custom_fields:
            temperature_controls:
              - position: absolute
              - top: 0
              - right: 0
              - bottom: 0
              - width: var(--rail-w)

        custom_fields:
          temperature_controls:
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                position: absolute
                inset: 0 0 0 auto
                width: var(--rail-w)
                grid-template-columns: 1fr
                grid-template-rows: repeat(3, 1fr)
                height: 100%
                margin: 0
                padding: 0
                align-items: stretch
                justify-items: stretch
              cards:
                - type: custom:button-card
                  template: [hemma_default]
                  show_entity_picture: true
                  entity_picture: /local/hemma/icons/increase.svg
                  tap_action:
                    action: call-service
                    service: input_number.increment
                    service_data:
                      entity_id: input_number.hemma_thermostat_target_temperature
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: var(--hemma-control-on)
                      - border-bottom: "0.5px solid rgba(255,255,255,0.1)"
                      - box-shadow: none !important
                    img_cell: [{ width: "30%" }]
                    icon: [{ transform: "rotate(-90deg)" }]

                - type: custom:button-card
                  template: [hemma_default]
                  name: SET
                  tap_action:
                    action: call-service
                    service: climate.set_temperature
                    service_data:
                      entity_id: "[[[ return entity.entity_id ]]]"
                      temperature: |
                        [[[
                          const helperState = states['input_number.hemma_thermostat_target_temperature']?.state;
                          const n = parseFloat(helperState);
                          
                          if (Number.isFinite(n)) return n;
                          
                          // Fallback to current thermostat target
                          const currentTarget = entity.attributes.temperature;
                          return Number.isFinite(currentTarget) ? currentTarget : 68;
                        ]]]
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: var(--hemma-control-on)
                      - box-shadow: none !important
                      - border-bottom: "0.5px solid rgba(255,255,255,0.1)"
                    name:
                      - font-size: 10px
                      - letter-spacing: 2px
                      - text-transform: uppercase
                      - font-weight: 600

                - type: custom:button-card
                  template: [hemma_default]
                  show_entity_picture: true
                  entity_picture: /local/hemma/icons/decrease.svg
                  tap_action:
                    action: call-service
                    service: input_number.decrement
                    service_data:
                      entity_id: input_number.hemma_thermostat_target_temperature
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - box-shadow: none !important
                      - background: var(--hemma-control-on)
                    img_cell: [{ width: "30%" }]
                    icon: [{ transform: "rotate(-90deg)" }]

  styles:
    card:
      - --rail-w: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return isMobile ? '48px' : '60px';
          ]]]
      - background: |
          [[[
            const mode = entity.state;
            const orange = 'var(--warning-color)'; // Hemma default for Heat
            const blue = 'var(--info-color)';     // Hemma default for Cool
            const base = 'rgba(255,255,255,0.06)';

            if (mode === 'heat')
              return `color-mix(in srgb, ${orange} 28%, ${base}) !important`;

            if (mode === 'cool')
              return `color-mix(in srgb, ${blue} 28%, ${base}) !important`;

            if (mode === 'heat_cool')
              return `
                linear-gradient(
                  135deg,
                  color-mix(in srgb, ${orange} 28%, ${base}),
                  color-mix(in srgb, ${blue} 28%, ${base})
                )
              `;

            return `${base} !important`;
          ]]]

      - backdrop-filter: blur(14px) saturate(140%)
      - transition: background 0.35s ease
    name:
      - color: |
          [[[
            const active = ['heat','cool','heat_cool'].includes(entity.state);
            return active
              ? 'var(--primary-text-color)'
              : 'var(--secondary-text-color)';
          ]]]
      - opacity: |
          [[[
            const on = states[variables.thermostat_toggle_helper]?.state === "on";
            return on ? "0" : "1";
          ]]]
      - transition: opacity 0.25s
    state:
      - opacity: |
          [[[
            const toggleOn = states[variables.thermostat_toggle_helper]?.state === "on";
            const isActive = ["cool","heat","heat_cool"].includes(entity.state);
            if (toggleOn) return "0";
            return isActive ? "1" : "0.85";  // Full opacity when active
          ]]]
      - transition: opacity 0.25s

    custom_fields:
      temp_puck:
        - position: absolute
        - top: var(--hemma-entity-inner-pad-current, 16px)
        - left: var(--hemma-entity-inner-pad-current, 16px)
        - width: var(--hemma-temp-puck-size, 44px)
        - height: var(--hemma-temp-puck-size, 44px)
        - z-index: 4
        - pointer-events: auto
        - "--mdc-ripple-color": transparent
        - "--paper-item-icon-active-color": transparent

      cooling_modes:
        - position: absolute
        - top: 0
        - right: 0
        - bottom: 0
        - width: var(--rail-w)
        - z-index: 2
        - pointer-events: auto
        - display: |
            [[[
              const on = states[variables.thermostat_toggle_helper]?.state === "on";
              return on ? "none" : "block";
            ]]]

      target_temperature:
        - position: absolute
        - inset: 0
        - z-index: 3
        - pointer-events: auto
        - display: |
            [[[
              const on = states[variables.thermostat_toggle_helper]?.state === "on";
              return on ? "block" : "none";
            ]]]

hemma_vacuum:
  template:
    - hemma_entity
  variables:
    icon: vacuum
    room: ""
  show_name: true
  show_label: false
  show_state: false

  tap_action:
    action: call-service
    service: script.clean_room
    service_data:
      room: "[[[ return variables.room ]]]"

  state:
    - value: cleaning
      styles:
        img_cell:
          - animation: rotating 1.6s linear infinite
        entity_picture:
          - filter: brightness(1.2) saturate(1.3)

  styles:
    card:
      - padding: 12px
    img_cell:
      - width: 32px
      - height: 32px
    name:
      - font-weight: 500
      - font-size: 15px

  extra_styles: |
    @keyframes rotating {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

# Air Quality Badge
# Shows air quality sensor with color-coded status
hemma_badge_air_quality:
  template: [hemma_badge_base]

  variables:
    enabled: true

  tap_action: { action: more-info }

  extra_styles: >
    [[[
      // Robust enabled check (see hemma_badge_base.yaml for pattern docs)
      const v = variables?.enabled;
      const enabled = (v === undefined || v === null) ? true :
        (typeof v === 'boolean') ? v :
        (typeof v === 'number') ? v !== 0 :
        !['false','0','no','off','disabled'].includes(String(v).trim().toLowerCase());

      const hasEnt  = !!entity?.entity_id;
      const stRaw   = String(entity?.state ?? '').trim();
      const st      = stRaw.toLowerCase();
      const hide    = !enabled || !hasEnt || !stRaw || ['unknown','unavailable','none'].includes(st);

      return `:host{display:${hide ? 'none' : 'inline-block'} !important;}`;
    ]]]

  styles:
    card:
      - display: >
          [[[
            // Robust enabled check (see hemma_badge_base.yaml for pattern docs)
            const v = variables?.enabled;
            const enabled = (v === undefined || v === null) ? true :
              (typeof v === 'boolean') ? v :
              (typeof v === 'number') ? v !== 0 :
              !['false','0','no','off','disabled'].includes(String(v).trim().toLowerCase());

            const hasEnt  = !!entity?.entity_id;
            const stRaw   = String(entity?.state ?? '').trim();
            const st      = stRaw.toLowerCase();
            const hide    = !enabled || !hasEnt || !stRaw || ['unknown','unavailable','none'].includes(st);

            return hide ? 'none' : 'inline-grid';
          ]]]
    icon:
      - color: >
          [[[
            const s = String(entity?.state || 'unknown').toLowerCase();
            if (s === 'excellent') return '#67f5a0';
            if (s === 'good')      return '#44e371';
            if (s === 'moderate')  return '#f0c741';
            if (s === 'bad')       return '#f5962a';
            if (s === 'very bad')  return '#e53552';
            return 'var(--disabled-text-color)';
          ]]]

  icon: >
    [[[
      const s = String(entity?.state || 'unknown').toLowerCase();
      if (s === 'very bad') return 'mdi:emoticon-dead-outline';
      if (['excellent','good','moderate','bad'].includes(s)) return 'mdi:blur';
      return 'mdi:cloud';
    ]]]

  name: >
    [[[
      const raw = String(entity?.state ?? 'Unknown');
      const nice = raw ? raw.charAt(0).toUpperCase() + raw.slice(1) : 'Unknown';

      const esc = (t) => String(t || '').replaceAll('"','&quot;');

      return `
        <div class="mp-wrap">
          <div class="mp-title">Air Quality</div>
          <div class="mp-sub">${esc(nice)}</div>
        </div>
      `;
    ]]]

# Base Badge Template
hemma_badge_base:
  styles:
    card:
      - background: var(--badge-background)
      - box-shadow: var(--badge-shadow)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border-radius: var(--badge-br, 9999px)
      - padding: var(--badge-padding-current, var(--badge-padding, 6px 14px))
      - min-height: var(--badge-min-height-current, var(--badge-min-height, 44px))
      - display: >
          [[[
            // Robust enabled check - handles boolean, number, and string inputs
            const v = variables?.enabled;
            if (v === undefined || v === null) return 'inline-grid';
            if (typeof v === 'boolean') return v ? 'inline-grid' : 'none';
            if (typeof v === 'number') return v !== 0 ? 'inline-grid' : 'none';
            const s = String(v).trim().toLowerCase();
            if (['false','0','no','off','disabled'].includes(s)) return 'none';
            return 'inline-grid';
          ]]]
      - align-items: center
      - gap: var(--badge-col-gap-current, var(--badge-col-gap, 10px))
      - width: fit-content
      - margin-inline-start: 0
      - margin-inline-end: 0
      - margin-block-start: 0
      - margin-block-end: 0
      - position: relative
      - isolation: isolate
      - --badge-title-color: var(--primary-text-color)
      - --badge-sub-color: var(--secondary-text-color)
      - background-clip: padding-box
      - overflow: hidden

    grid:
      - grid-template-areas: '"i l"'
      - grid-template-columns: min-content minmax(0, 1fr)
      - column-gap: var(--badge-col-gap-current, var(--badge-col-gap, 10px))
      - row-gap: 0
      - align-items: center

    name:
      - grid-area: l
      - min-width: 0
      - color: var(--badge-title-color, var(--secondary-text-color))
      - font-weight: 700
      - font-size: var(--badge-font-size-current, var(--badge-font-size, 13px))
      - line-height: 1.2
      - text-align: left
      - justify-self: start
      - z-index: 4

    icon:
      - grid-area: i
      - width: var(--badge-icon-size-current, var(--badge-icon-size, 28px))
      - height: var(--badge-icon-size-current, var(--badge-icon-size, 28px))
      - color: var(--primary-text-color)
      - z-index: 4

    img_cell:
      - width: var(--badge-icon-size-current, var(--badge-icon-size, 30px)) !important
      - height: var(--badge-icon-size-current, var(--badge-icon-size, 30px)) !important
      - border-radius: 9999px !important
      - overflow: hidden !important
      - display: block !important

    entity_picture:
      - grid-area: i
      - width: var(--badge-icon-size-current, var(--badge-icon-size, 28px))
      - height: var(--badge-icon-size-current, var(--badge-icon-size, 28px))
      - border-radius: 50%
      - z-index: 4
      - object-fit: cover

    label:
      - font-size: var(--badge-font-size-current, var(--badge-font-size, 13px))

    state:
      - font-size: var(--badge-font-size-current, var(--badge-font-size, 13px))

  extra_styles: |
    :host{
      --media-sub-opacity: .82;
      --badge-after-z:  2;
      --badge-before-z: 3;
    }

    @media (max-width: 767px) and (orientation: portrait) {
      ha-card {
        min-height: 43px !important;
        padding: 1px 14px 1px 6px !important;
      }
      #img-cell, .img-cell {
        width: 32px !important;
        height: 32px !important;
      }
      #name {
        font-size: 13px !important;
      }
      .mp-title {
        font-size: 13px !important;
      }
      .mp-sub {
        font-size: 12px !important;
      }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      ha-card {
        min-height: 36px !important;
        padding: 1px 12px 1px 6px !important;
      }
      #img-cell, .img-cell {
        width: 26px !important;
        height: 26px !important;
      }
      #name {
        font-size: 12px !important;
      }
      .mp-title {
        font-size: 12px !important;
      }
      .mp-sub {
        font-size: 11px !important;
      }
    }

    ha-card::after{  z-index: var(--badge-after-z, 2) !important; }
    ha-card::before{ z-index: var(--badge-before-z, 3) !important; }

    #img-cell{
      width:  var(--badge-icon-size-current, var(--badge-icon-size, 32px)) !important;
      height: var(--badge-icon-size-current, var(--badge-icon-size, 32px)) !important;
      border-radius: 9999px !important;
      overflow: hidden !important;
      display: block !important;
    }

    #img-cell img,
    #img-cell ha-img{
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      border-radius: inherit !important;
    }

    #name{
      display:flex !important;
      align-items:center !important;
      padding-block: 2px !important;
      min-width: 0 !important;
      overflow: hidden !important;
      line-height: normal !important;
    }

    .mp-wrap{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap: 2px;
      min-width:0;
      max-width:100%;
      padding-top: 0 !important;
      padding-bottom: 2px !important;
    }

    .mp-title{
      font-size: var(--badge-font-size-current, 13px);
      font-weight: 700;
      line-height: 1.1;
      color: var(--badge-title-color, var(--secondary-text-color));
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mp-sub{
      font-size: calc(var(--badge-font-size-current, 13px) - 1px);
      font-weight: 500;
      line-height: 1.05;
      opacity: var(--media-sub-opacity, .82);
      color: var(--badge-sub-color, var(--secondary-text-color));
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }


