      # Navigation Buttons (Edit these)
      routes:
        - url: /dashboard-hemma/home
          label: Home
          icon: mdi:home-variant

        - label: "First Floor ▾"
          icon: mdi:numeric-1-circle-outline
          tap_action:
            action: open-popup
          selected: >
            [[[
              const p = window.location.pathname || '';
              return [
                '/dashboard-hemma/first-floor',
                '/dashboard-hemma/entrance',
                '/dashboard-hemma/bathroom',
                '/dashboard-hemma/rec-room'
              ].includes(p);
            ]]]
          popup:
            - label: Overview
              url: /dashboard-hemma/first-floor
              icon: mdi:floor-plan
            - label: Entrance
              url: /dashboard-hemma/entrance
              icon: mdi:door
            - label: Bathroom
              url: /dashboard-hemma/bathroom
              icon: mdi:shower
            - label: Rec Room
              url: /dashboard-hemma/rec-room
              icon: mdi:sofa-outline

        - label: "Second Floor ▾"
          icon: mdi:numeric-2-circle-outline
          tap_action:
            action: open-popup
          selected: >
            [[[
              const p = window.location.pathname || '';
              return [
                '/dashboard-hemma/second-floor',
                '/dashboard-hemma/living-room',
                '/dashboard-hemma/kitchen',
                '/dashboard-hemma/dining-room'
              ].includes(p);
            ]]]
          popup:
            - label: Overview
              url: /dashboard-hemma/second-floor
              icon: mdi:floor-plan
            - label: Living Room
              url: /dashboard-hemma/living-room
              icon: mdi:sofa
            - label: Kitchen
              url: /dashboard-hemma/kitchen
              icon: mdi:fridge
            - label: Dining Room
              url: /dashboard-hemma/dining-room
              icon: mdi:table-furniture

        - label: "Third Floor ▾"
          icon: mdi:numeric-3-circle-outline
          tap_action:
            action: open-popup
          selected: >
            [[[
              const p = window.location.pathname || '';
              return [
                '/dashboard-hemma/third-floor',
                '/dashboard-hemma/master-bed-room',
                '/dashboard-hemma/guest-bathroom',
                '/dashboard-hemma/master-bathroom'
              ].includes(p);
            ]]]
          popup:
            - label: Overview
              url: /dashboard-hemma/third-floor
              icon: mdi:floor-plan
            - label: Master Bedroom
              url: /dashboard-hemma/master-bed-room
              icon: mdi:bed-king
            - label: Guest Bathroom
              url: /dashboard-hemma/guest-bathroom
              icon: mdi:shower
            - label: Master Bathroom
              url: /dashboard-hemma/master-bathroom
              icon: mdi:shower-head

        - label: "Outdoors ▾"
          icon: mdi:pine-tree
          tap_action:
            action: open-popup
          selected: >
            [[[
              const p = window.location.pathname || '';
              return [
                '/dashboard-hemma/outdoors',
                '/dashboard-hemma/patio',
                '/dashboard-hemma/garage'
              ].includes(p);
            ]]]
          popup:
            - label: Overview
              url: /dashboard-hemma/outdoors
              icon: mdi:pine-tree
            - label: Patio
              url: /dashboard-hemma/patio
              icon: mdi:balcony
            - label: Garage
              url: /dashboard-hemma/garage
              icon: mdi:garage

        - label: "Scenes ▾"
          icon: mdi:layers
          tap_action:
            action: open-popup
          popup: |
            [[[
              const reg = hass.entities;

              const getRegEntry = (id) => {
                if (!reg) return null;
                if (Array.isArray(reg)) return reg.find(e => e?.entity_id === id) || null;
                return reg[id] || (reg.get ? reg.get(id) : null) || null;
              };

              const isHidden = (id) => {
                const e = getRegEntry(id);
                return !!(e && (e.hidden || e.hidden_by || e.disabled || e.disabled_by));
              };

              const scenes = Object.values(hass.states || {})
                .filter(e => e?.entity_id?.startsWith('scene.'))
                .filter(s => !isHidden(s.entity_id))
                .slice()
                .sort((a,b) => (a.attributes?.friendly_name || a.entity_id)
                  .localeCompare(b.attributes?.friendly_name || b.entity_id));

              return scenes.map(s => ({
                label: s.attributes?.friendly_name || s.entity_id.replace('scene.',''),
                icon: s.attributes?.icon || 'mdi:layers',
                tap_action: {
                  action: 'call-service',
                  service: 'scene.turn_on',
                  service_data: { entity_id: s.entity_id }
                }
              }));
            ]]]
