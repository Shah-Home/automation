- type: custom:button-card
  template: hemma_thermostat
  entity: climate.living_room_thermostat
  name: Thermostat
  variables:
    temp_sensor: sensor.living_room_thermostat_temperature

- type: custom:button-card
  template: hemma_media
  entity: media_player.living_room_tv
  name: Living Room TV
  variables:
    icon: tv

- type: custom:button-card
  template: hemma_light
  entity: switch.living_room_lights
  name: Lights
  variables:
    icon: light

- type: custom:button-card
  template: hemma_media
  entity: media_player.main_floor_speakers
  name: Main Floor Speakers
  variables:
    icon: speaker

- type: custom:button-card
  template: hemma_vacuum
  entity: vacuum.cleaning_lady
  name: Clean Living Room
  variables:
    room: living room

