- type: custom:button-card
  template: hemma_room
  name: Second Floor
  variables:
    image: home
    image_position: center center
    show_weather: true
    weather_mode: room
    temp_unit: "F"

- !include /config/dashboards/templates/includes/hemma_navigation.yaml

- !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

- type: custom:layout-card
  class: hemma-entities
  layout_type: custom:grid-layout
  layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
  cards:
    - !include /config/dashboards/metadata/rooms/second_floor/tiles/01_living_room.yaml
    - !include /config/dashboards/metadata/rooms/second_floor/tiles/02_kitchen.yaml
    - !include /config/dashboards/metadata/rooms/second_floor/tiles/03_dining_room.yaml
