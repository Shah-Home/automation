homeassistant:
  packages: !include_dir_named packages

# Loads default set of integrations. Do not remove.
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include_dir_merge_named scripts
scene: !include scenes.yaml
template: !include sensors.yaml

lovelace:
  mode: storage
  resources:
    - type: module
      url: /hacsfiles/button-card/button-card.js
    - type: module
      url: /hacsfiles/kiosk-mode/kiosk-mode.js
    - type: module
      url: /local/hemma/scripts/layout-card-modified.js
    - type: module
      url: /local/hemma/scripts/navbar-popup-caret.js
    - type: module
      url: /local/hemma/scripts/navbar-sidebar-offset.js
    - type: module
      url: /local/hemma/scripts/navbar-scroll.js
    - type: module
      url: /local/hemma/scripts/swipe-card-patch.js
    - type: module
      url: /local/hemma/scripts/hemma-smart-row.js
    - type: css
      url: /local/hemma/fonts/hanken-grotesk.css
  dashboards:
    dashboard-hemma:
      mode: yaml
      title: "Home"
      icon: mdi:view-dashboard
      show_in_sidebar: true
      filename: dashboards/hemma/hemma.yaml
